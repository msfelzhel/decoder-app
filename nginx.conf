events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Перенаправляем с корня на /decoder-app/
        location = / {
            return 301 /decoder-app/;
        }

        # Основное приложение
        location /decoder-app {
            alias /usr/share/nginx/html;
            try_files $uri $uri/ /decoder-app/index.html;
        }

        # Статические файлы
        location /decoder-app/static {
            alias /usr/share/nginx/html/static;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Для старых ссылок без /decoder-app
        location /static {
            alias /usr/share/nginx/html/static;
            expires 30d;
        }
    }
}